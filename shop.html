<!DOCTYPE html>
<html>

<head>
    <title>Crystal Wildlife</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        <!-- FIXED PATH -->
        <img src="images/DazzlecrystalsLogo.svg" alt="Dazzle Crystals Logo">
    </div>

    <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#contact">Contact</a>
    </nav>

    <div class="nav-right">
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search crystals...">
        </div>

        <a href="cart.html" class="cart">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cart-count">0</span>
        </a>

        <div id="cart-message" class="cart-message"></div>
    </div>

</header>

<section class="products">

    <div class="shop-container">

        <!-- LEFT FILTERS -->
        <div class="filters">

            <h3>Filters</h3>

            <h4>Price</h4>
            <label><input type="checkbox" value="0-50" class="price-filter"> Under $50</label><br>
            <label><input type="checkbox" value="50-100" class="price-filter"> $50 - $100</label><br>
            <label><input type="checkbox" value="100-200" class="price-filter"> Above $100</label>

            <h4>Collections</h4>

            <label><input type="checkbox" value="wildlife" class="collection-filter"> Wildlife</label><br>
            <label><input type="checkbox" value="ocean" class="collection-filter"> Ocean</label><br>
            <label><input type="checkbox" value="garden" class="collection-filter"> Garden</label><br>
            <label><input type="checkbox" value="fantasy" class="collection-filter"> Fantasy</label><br>
            <label><input type="checkbox" value="celestial" class="collection-filter"> Celestial</label>

            <button id="clear-filters" class="clear-btn">Clear Filters</button>

        </div>

        <!-- RIGHT PRODUCTS -->
        <div class="products-content">

            <h2>Shop Your Crystal</h2>

            <div class="top-bar">

                <p id="result-count">0 Results</p>

                <select id="sort">
                    <option value="default">Sort By</option>
                    <option value="low-high">Price: Low to High</option>
                    <option value="high-low">Price: High to Low</option>
                </select>

            </div>

            <div class="product-grid" id="product-container">


            </div>

        </div>

    </div>

</section>

<footer>

<h3>Dazzle Crystals</h3>
<p>Email: dazzlcrystals@email.com</p>
<p>© 2025 Dazzle Crystals</p>

</footer>

<script src="js/script.js"></script>

</body>
</html>

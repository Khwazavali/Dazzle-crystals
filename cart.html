<!DOCTYPE html>
<html>

<head>
    <title>Your Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        <img src="images/DazzlecrystalsLogo.svg" alt="Dazzle Crystals Logo">
    </div>

    <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#contact">Contact</a>
    </nav>

    <div class="nav-right">
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search crystals...">
        </div>

        <a href="cart.html" class="cart">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cart-count">0</span>
        </a>
    </div>

</header>

<section class="cart-page">

    <div class="cart-left">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
    </div>

    <div class="cart-right">
        <h2>Summary</h2>

        <p id="subtotal"></p>
        <p>Shipping: Free</p>

        <hr>

        <h3 id="total"></h3>

        <button class="checkout-btn" onclick="window.location.href='checkout.html'">
            Checkout
        </button>
    </div>

</section>

<footer>
    <h3>Dazzle Crystals</h3>
    <p>Email: dazzlcrystals@email.com</p>
    <p>© 2025 Dazzle Crystals</p>
</footer>

<script src="js/cart.js"></script>

</body>
</html>

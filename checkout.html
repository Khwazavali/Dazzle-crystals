<!doctype html>

<html>
  <head>
    <title>Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">
        <img src="images/DazzlecrystalsLogo.svg" alt="Dazzle Crystals Logo" />
      </div>

      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#contact">Contact</a>
      </nav>

      <div class="nav-right">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search crystals..." />
        </div>

        <a href="cart.html" class="cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count">0</span>
        </a>

        <div id="cart-message" class="cart-message"></div>
      </div>
    </header>

    <!-- 🔥 STEPPER -->
    <section class="checkout-steps">
      <div class="step active" id="step-indicator-1">
        <div class="circle">1</div>
        <p>Details</p>
      </div>

      <div class="line"></div>

      <div class="step" id="step-indicator-2">
        <div class="circle">2</div>
        <p>Payment</p>
      </div>

      <div class="line"></div>

      <div class="step" id="step-indicator-3">
        <div class="circle">3</div>
        <p>Done</p>
      </div>
    </section>

    <section class="checkout-container">
      <!-- STEP 1 -->
      <div id="step-1">
        <div class="checkout-box">
          <h2>Shipping Details</h2>

          <input type="text" id="name" placeholder="Full Name" />

          <input type="email" id="email" placeholder="Email" />

          <div class="phone-group">
            <span class="country-code">+1</span>
            <input
              type="text"
              id="phone"
              maxlength="10"
              placeholder="e.g. 9876543210"
            />
          </div>

          <input type="text" id="street" placeholder="Street Address" />

          <div class="row">
            <input type="text" id="city" placeholder="City" />

            <select id="state">
              <option value="" disabled selected hidden>Select State</option>
              <option>CA</option>
              <option>NY</option>
              <option>TX</option>
              <option>FL</option>
              <option>IL</option>
              <option>PA</option>
              <option>OH</option>
              <option>GA</option>
              <option>NC</option>
              <option>MI</option>
            </select>
          </div>

          <input type="text" id="zip" placeholder="Zip Code" />

          <button id="next-btn" disabled>Next →</button>
        </div>
      </div>

      <!-- STEP 2 -->
      <div id="step-2" style="display: none">
        <div class="checkout-box">
          <h2>Card Details</h2>
          <input
            type="text"
            id="card-number"
            maxlength="19"
            placeholder="1234 5678 9012 3456"
          />
          <div class="row">
            <input type="text" id="expiry" maxlength="5" placeholder="MM/YY" />
            <input type="text" id="cvv" maxlength="3" placeholder="CVV" />
          </div>
          <input type="text" id="card-name" placeholder="Name on Card" />

          <div class="payment-actions">
            <button id="back-btn" class="secondary-btn">← Previous</button>
            <button id="pay-btn" class="primary-btn" disabled>Pay Now</button>
          </div>
        </div>
      </div>

      <!-- STEP 3 -->
      <div id="step-3" style="display: none">
        <div class="checkout-box success-box">
          <div class="success-icon">✅</div>
          <h2>Order Placed</h2>

          <p>Your order has been successfully placed.</p>

          <p class="order-id">Order ID: <span id="order-id"></span></p>

          <a href="index.html" class="primary-btn">Continue Shopping</a>
        </div>
      </div>
    </section>

    <footer>
      <h3>Dazzle Crystals</h3>
      <p>Email: dazzlcrystals@email.com</p>
      <p>© 2025 Dazzle Crystals</p>
    </footer>

    <script src="js/checkout.js"></script>
  </body>
</html>

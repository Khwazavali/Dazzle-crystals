<!doctype html>
<html>
  <head>
    <title>Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">
        <img src="images/DazzlecrystalsLogo.svg" alt="Dazzle Crystals Logo" />
      </div>

      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#contact">Contact</a>
      </nav>

      <div class="nav-right">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search crystals..." />
        </div>

        <a href="cart.html" class="cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count">0</span>
        </a>

        <div id="cart-message" class="cart-message"></div>
      </div>
    </header>

    <!-- 🔥 MODERN STEPPER -->
    <section class="checkout-steps">
      <div class="step active">
        <div class="circle">1</div>
        <p>Details</p>
      </div>

      <div class="line"></div>

      <div class="step">
        <div class="circle">2</div>
        <p>Payment</p>
      </div>

      <div class="line"></div>

      <div class="step">
        <div class="circle">3</div>
        <p>Done</p>
      </div>
    </section>

    <!-- STEP 1 -->
    <section class="checkout-container">
      <div class="checkout-box">
        <h2>Shipping Details</h2>

        <input type="text" id="name" placeholder="Full Name" />

        <input type="email" id="email" placeholder="Email" />

        <div class="phone-group">
          <span class="country-code">+1</span>
          <input
            type="text"
            id="phone"
            maxlength="10"
            placeholder="e.g. 9876543210"
          />
        </div>

        <input type="text" id="street" placeholder="Street Address" />

        <div class="row">
          <input type="text" id="city" placeholder="City" />

          <select id="state">
            <option value="" disabled selected hidden>Select State</option>
            <option>CA</option>
            <option>NY</option>
            <option>TX</option>
            <option>FL</option>
            <option>IL</option>
            <option>PA</option>
            <option>OH</option>
            <option>GA</option>
            <option>NC</option>
            <option>MI</option>
          </select>
        </div>

        <input type="text" id="zip" placeholder="Zip Code" />

        <button id="next-btn" disabled>Next →</button>
      </div>
    </section>

    <footer>
      <h3>Dazzle Crystals</h3>
      <p>Email: dazzlcrystals@email.com</p>
      <p>© 2025 Dazzle Crystals</p>
    </footer>

    <script src="js/checkout.js"></script>
  </body>
</html>
